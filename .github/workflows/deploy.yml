name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Build Rspack app
      - name: Install root dependencies
        run: npm ci

      - name: Build app (Rspack → dist/)
        run: npm run build

      # Build Rspress docs
      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build docs (Rspress → website/doc_build/)
        working-directory: website
        run: npm run build

      # Assemble combined artifact: app at root, docs at /docs/
      - name: Assemble deployment directory
        run: |
          mkdir -p _site/docs
          cp -r dist/. _site/
          cp -r website/doc_build/. _site/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
